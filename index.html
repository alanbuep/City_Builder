<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#9fc9e8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon-192.png" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <title>City Builder</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%; overflow: hidden;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #app { position: fixed; inset: 0; }

      /* --- Paneles genéricos: vidrio azulado redondeado, estilo SimCity BuildIt. --- */
      .panel {
        background: linear-gradient(rgba(21, 45, 75, 0.86), rgba(10, 24, 44, 0.86));
        color: #fff;
        padding: 10px 12px; border-radius: 14px;
        border: 1px solid rgba(140, 190, 255, 0.22);
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(5px); font-size: 13px;
      }

      /* --- Botones "caramelo" azules con panza y sombra, estilo BuildIt. --- */
      .ctrl {
        border: none; border-radius: 11px; padding: 7px 13px; cursor: pointer;
        color: #fff; font-size: 13px; font-weight: 600; white-space: nowrap;
        background: linear-gradient(#54aaf8, #1d7ad8);
        box-shadow: 0 2px 0 #14589f, 0 2px 5px rgba(0, 0, 0, 0.25);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
        transition: filter 0.12s, transform 0.05s, box-shadow 0.05s;
      }
      .ctrl:hover { filter: brightness(1.12); }
      .ctrl:active { transform: translateY(2px); box-shadow: 0 0 0 #14589f; }
      .ctrl.active {
        background: linear-gradient(#ffd354, #f59d0e);
        box-shadow: 0 2px 0 #b06f06, 0 2px 5px rgba(0, 0, 0, 0.25);
      }
      .ctrl[disabled] { opacity: 0.4; cursor: not-allowed; }

      /* --- Barra SUPERIOR de recursos (siempre visible, se desliza si no entra) --- */
      #topbar {
        position: fixed; top: 0; left: 0; right: 0; z-index: 10;
        display: flex; gap: 5px; align-items: center;
        padding: 6px 8px; padding-top: max(6px, env(safe-area-inset-top));
        overflow-x: auto; overflow-y: hidden; scrollbar-width: none;
        background: linear-gradient(rgba(21, 45, 75, 0.92), rgba(10, 24, 44, 0.88));
        border-bottom: 1px solid rgba(140, 190, 255, 0.22);
        backdrop-filter: blur(5px);
      }
      #topbar::-webkit-scrollbar { display: none; }
      .chip {
        display: flex; align-items: center; gap: 4px; flex: 0 0 auto;
        background: rgba(0, 0, 0, 0.28); color: #fff;
        border-radius: 9px; padding: 4px 8px; font-size: 12px; white-space: nowrap;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .chip b { font-weight: 700; }
      .chip-level { flex-direction: column; gap: 2px; padding: 3px 8px; }
      .chip-bar {
        display: block; width: 44px; height: 4px; border-radius: 3px;
        background: rgba(0, 0, 0, 0.5); overflow: hidden;
      }
      .chip-bar > span { display: block; height: 100%; width: 0; background: #ffd54f; border-radius: 3px; transition: width 0.3s; }
      .rci-mini { display: flex; gap: 2px; align-items: flex-end; height: 16px; }
      .rci-col { width: 5px; height: 16px; background: rgba(255, 255, 255, 0.12); border-radius: 2px; position: relative; }
      .rci-col i { position: absolute; bottom: 0; left: 0; right: 0; border-radius: 2px; transition: height 0.25s; }

      /* --- Barra de ACCIONES de abajo (reloj a la izquierda, menús + Construir a la derecha) --- */
      #actionbar {
        position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
        display: flex; gap: 6px; align-items: center;
        padding: 8px; padding-bottom: max(8px, env(safe-area-inset-bottom));
        overflow-x: auto; scrollbar-width: none;
        background: linear-gradient(rgba(21, 45, 75, 0.92), rgba(10, 24, 44, 0.92));
        border-top: 1px solid rgba(140, 190, 255, 0.22);
        backdrop-filter: blur(5px);
      }
      #actionbar::-webkit-scrollbar { display: none; }
      .ab-spacer { flex: 1; min-width: 4px; }
      .ab-extras { display: flex; gap: 6px; }
      .build-btn {
        font-size: 14px; font-weight: 800; padding: 9px 16px; border-radius: 13px;
        background: linear-gradient(#7ddf64, #2eb22e);
        box-shadow: 0 3px 0 #1d7a1d, 0 3px 7px rgba(0, 0, 0, 0.3);
      }
      .build-btn:active { transform: translateY(3px); box-shadow: 0 0 0 #1d7a1d; }

      /* --- Ventanas modales CENTRADAS (construir, misiones, tecnología, etc.) --- */
      .modal-overlay {
        position: fixed; inset: 0; z-index: 50;
        background: rgba(4, 10, 20, 0.55); backdrop-filter: blur(2px);
        display: flex; align-items: center; justify-content: center;
      }
      .modal {
        width: min(540px, 94vw); max-height: min(76vh, 620px);
        display: flex; flex-direction: column; padding: 0; overflow: hidden;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
      }
      .modal-head {
        display: flex; align-items: center; gap: 8px;
        padding: 10px 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      }
      .modal-title { flex: 1; font-weight: 800; font-size: 16px; text-align: center; }
      .modal-nav {
        border: none; border-radius: 10px; width: 34px; height: 34px; cursor: pointer;
        background: linear-gradient(#3b6ea8, #28507e); color: #fff; font-size: 15px; font-weight: 700;
        box-shadow: 0 2px 0 #1a3a5e;
      }
      .modal-nav:hover { filter: brightness(1.15); }
      .modal-nav:active { transform: translateY(2px); box-shadow: 0 0 0 #1a3a5e; }
      .modal-body { overflow-y: auto; padding: 12px; }

      /* Catálogo de construcción: grilla de rubros → lista de edificios. */
      .build-cats {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 8px;
      }
      .build-cat {
        display: flex; flex-direction: column; align-items: center; gap: 3px;
        border: none; border-radius: 13px; padding: 12px 6px 9px; cursor: pointer; color: #fff;
        background: linear-gradient(#54aaf8, #1d7ad8);
        box-shadow: 0 3px 0 #14589f, 0 3px 6px rgba(0, 0, 0, 0.3);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
        transition: filter 0.12s, transform 0.05s, box-shadow 0.05s;
      }
      .build-cat:hover { filter: brightness(1.12); }
      .build-cat:active { transform: translateY(3px); box-shadow: 0 0 0 #14589f; }
      .build-cat .ico { font-size: 26px; }
      .build-cat .nm { font-size: 12px; font-weight: 700; text-align: center; }
      .build-cat .ct { font-size: 10px; opacity: 0.75; }

      .build-list { display: flex; flex-direction: column; gap: 6px; }
      .build-item {
        display: flex; flex-direction: column; gap: 2px;
        border: none; border-radius: 11px; padding: 9px 12px;
        font-size: 13px; font-weight: 600; cursor: pointer; text-align: left; color: #fff;
        background: linear-gradient(#3b6ea8, #28507e);
        box-shadow: 0 2px 0 #1a3a5e, 0 2px 5px rgba(0, 0, 0, 0.25);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
        transition: filter 0.12s, transform 0.05s, box-shadow 0.05s;
      }
      .build-item:hover { filter: brightness(1.15); }
      .build-item:active { transform: translateY(2px); box-shadow: 0 0 0 #1a3a5e; }
      .build-item.locked {
        background: linear-gradient(#5a6470, #424a54);
        box-shadow: 0 2px 0 #2e343c; opacity: 0.75; cursor: not-allowed;
      }
      .build-item.locked:hover { filter: none; }
      .build-item .row1 { display: flex; justify-content: space-between; align-items: center; gap: 8px; width: 100%; }
      .build-item .desc { font-size: 11px; font-weight: 400; opacity: 0.8; line-height: 1.35; white-space: normal; }
      .tool-cost { font-size: 11px; opacity: 0.85; font-weight: 700; color: #ffe9a8; }

      .mission-row { margin-bottom: 10px; line-height: 1.4; }
      .mission-row.done { opacity: 0.7; margin-bottom: 4px; }

      /* --- Píldora "Construyendo: …" (abajo al centro, sobre la barra) --- */
      #toolpill {
        position: fixed; bottom: 62px; left: 50%; transform: translateX(-50%); z-index: 12;
        display: flex; gap: 10px; align-items: center; white-space: nowrap; max-width: 96vw;
      }

      /* --- Métricas dentro de modales --- */
      .stat { display: flex; justify-content: space-between; gap: 16px; line-height: 1.7; }
      .stat .val { font-weight: 600; }
      .tech-count { font-size: 11px; opacity: 0.7; margin-bottom: 4px; }
      .tech-next { line-height: 1.4; margin-bottom: 6px; font-size: 12px; }
      .tech-bar {
        height: 9px; background: rgba(0, 0, 0, 0.45); border-radius: 6px; overflow: hidden;
        box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5);
      }
      .tech-fill {
        height: 100%; width: 0; border-radius: 6px; transition: width 0.3s;
        background: linear-gradient(#a5f7bc, #58d97e);
      }

      /* --- Panel inspector (abajo al centro, sobre la barra de acciones) --- */
      #inspector { position: fixed; bottom: 62px; left: 50%; transform: translateX(-50%); z-index: 11; }
      .inspector { min-width: 250px; max-width: min(96vw, 360px); max-height: 46vh; overflow-y: auto; }
      .insp-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
      .insp-title { font-weight: 700; font-size: 15px; }
      .insp-close {
        border: none; background: transparent; color: #fff; cursor: pointer;
        font-size: 15px; opacity: 0.7; padding: 2px 6px;
      }
      .insp-close:hover { opacity: 1; }
      .insp-body { line-height: 1.7; opacity: 0.92; margin-bottom: 8px; }
      .insp-actions { display: flex; gap: 6px; flex-wrap: wrap; }

      /* --- Notificaciones (abajo a la izquierda, sobre la barra) --- */
      #notifications {
        position: fixed; bottom: 62px; left: 8px; z-index: 9;
        display: flex; flex-direction: column; gap: 6px; align-items: flex-start;
        max-width: min(300px, 56vw); max-height: 180px; overflow-y: auto;
      }
      .notif {
        display: flex; gap: 8px; align-items: center;
        background: rgba(0, 0, 0, 0.6); color: #fff;
        padding: 7px 11px; border-radius: 8px; font-size: 12px;
        backdrop-filter: blur(4px); border-left: 3px solid #9ecbff;
      }
      .notif.warn { border-left-color: #ff6b6b; }
      .notif.info { border-left-color: #ffd54f; }

      /* --- Toasts (avisos temporales) debajo de la barra superior --- */
      #toasts {
        position: fixed; top: 48px; left: 50%; transform: translateX(-50%); z-index: 40;
        display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none;
      }
      .toast {
        display: flex; gap: 10px; align-items: center;
        background: linear-gradient(rgba(26, 56, 92, 0.95), rgba(13, 30, 54, 0.95));
        color: #fff; font-weight: 600;
        padding: 10px 16px; border-radius: 13px; font-size: 14px;
        border: 1px solid rgba(140, 190, 255, 0.3);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5); border-left: 4px solid #7CFC9A;
        opacity: 0; transform: translateY(-12px); transition: opacity 0.35s, transform 0.35s;
      }
      .toast.show { opacity: 1; transform: translateY(0); }
      .toast-icon { font-size: 18px; }

      /* La ayuda según el dispositivo: mouse o dedo. */
      .hint-touch { display: none; }
      @media (pointer: coarse) {
        .hint-mouse { display: none; }
        .hint-touch { display: inline; }
      }

      /* --- Dedos en vez de mouse: botones más grandes --- */
      @media (pointer: coarse) {
        .ctrl { padding: 9px 13px; font-size: 14px; }
        .build-btn { font-size: 15px; padding: 11px 16px; }
        .build-item { padding: 11px 12px; font-size: 14px; }
        .modal-nav { width: 40px; height: 40px; font-size: 17px; }
        .chip { font-size: 12px; padding: 5px 9px; }
      }

      /* --- Pantalla chica (celular) --- */
      @media (max-width: 820px) {
        .panel { font-size: 12px; padding: 8px 10px; }
        .modal { width: 94vw; max-height: 80vh; }
        .build-cats { grid-template-columns: repeat(auto-fill, minmax(84px, 1fr)); }
        #inspector { bottom: 64px; max-width: 96vw; }
        #toolpill { bottom: 64px; }
        #notifications { bottom: 64px; max-width: 56vw; max-height: 120px; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="topbar"></div>
    <div id="inspector"></div>
    <div id="actionbar"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
