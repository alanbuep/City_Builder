<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#9fc9e8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon-192.png" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <title>City Builder</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%; overflow: hidden;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #app { position: fixed; inset: 0; }

      /* --- Paneles genéricos (HUD y toolbar comparten estilo) ---
             Vidrio azulado redondeado, estilo SimCity BuildIt. --- */
      .panel {
        background: linear-gradient(rgba(21, 45, 75, 0.86), rgba(10, 24, 44, 0.86));
        color: #fff;
        padding: 10px 12px; border-radius: 14px;
        border: 1px solid rgba(140, 190, 255, 0.22);
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(5px); font-size: 13px;
      }

      /* --- Barra de herramientas (arriba a la izquierda) --- */
      #toolbar {
        position: fixed; top: 12px; left: 12px; z-index: 10;
        display: flex; flex-direction: column; gap: 8px; width: 220px;
        background: linear-gradient(rgba(21, 45, 75, 0.86), rgba(10, 24, 44, 0.86));
        border: 1px solid rgba(140, 190, 255, 0.22);
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
        padding: 8px; border-radius: 14px; backdrop-filter: blur(5px);
        max-height: calc(100vh - 24px); overflow-y: auto;
      }
      .tool-cats { display: flex; flex-wrap: wrap; gap: 4px; }
      /* Indicador de la herramienta activa (el popup de edificios se cierra al elegir). */
      .tool-current {
        font-size: 12px; padding: 5px 6px 1px; opacity: 0.92;
        border-top: 1px solid rgba(255, 255, 255, 0.12);
      }
      /* Popup flotante con los edificios de la categoría abierta. */
      .tool-popup {
        position: fixed; z-index: 20; width: 240px;
        max-height: calc(100vh - 24px); overflow-y: auto;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.5);
      }
      /* Botones "caramelo" azules con panza y sombra, estilo BuildIt. */
      .cat {
        border: none; border-radius: 999px; padding: 6px 11px;
        font-size: 12px; font-weight: 700; cursor: pointer; color: #fff;
        background: linear-gradient(#54aaf8, #1d7ad8);
        box-shadow: 0 2px 0 #14589f, 0 3px 6px rgba(0, 0, 0, 0.3);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
        transition: filter 0.12s, transform 0.05s, box-shadow 0.05s;
      }
      .cat:hover { filter: brightness(1.12); }
      .cat:active { transform: translateY(2px); box-shadow: 0 0 0 #14589f, 0 1px 3px rgba(0, 0, 0, 0.3); }
      .cat.active {
        background: linear-gradient(#ffd354, #f59d0e);
        box-shadow: 0 2px 0 #b06f06, 0 3px 6px rgba(0, 0, 0, 0.3);
      }

      .tool-list { display: flex; flex-direction: column; gap: 5px; }
      .tool-row { display: flex; gap: 5px; }
      .tool {
        flex: 1; display: flex; justify-content: space-between; align-items: center; gap: 8px;
        border: none; border-radius: 11px; padding: 8px 11px;
        font-size: 13px; font-weight: 600; cursor: pointer; text-align: left; color: #fff;
        background: linear-gradient(#3b6ea8, #28507e);
        box-shadow: 0 2px 0 #1a3a5e, 0 2px 5px rgba(0, 0, 0, 0.25);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
        transition: filter 0.12s, transform 0.05s, box-shadow 0.05s;
      }
      .tool:hover { filter: brightness(1.15); }
      .tool:active { transform: translateY(2px); box-shadow: 0 0 0 #1a3a5e; }
      .tool.active {
        background: linear-gradient(#ffd354, #f59d0e);
        box-shadow: 0 2px 0 #b06f06, 0 2px 5px rgba(0, 0, 0, 0.25);
      }
      .tool.locked {
        background: linear-gradient(#5a6470, #424a54);
        box-shadow: 0 2px 0 #2e343c;
        opacity: 0.7; cursor: not-allowed;
      }
      .tool.locked:hover { filter: none; }
      .tool-cost { font-size: 11px; opacity: 0.8; font-weight: 400; }

      .tool-info {
        border: none; border-radius: 11px; padding: 0 10px; cursor: pointer;
        background: linear-gradient(#3b6ea8, #28507e); color: #cfe7ff; font-size: 13px;
        box-shadow: 0 2px 0 #1a3a5e;
      }
      .tool-info:hover { filter: brightness(1.15); }
      .tool-tip {
        position: fixed; z-index: 30; max-width: 240px;
        background: rgba(20, 20, 20, 0.96); color: #fff;
        padding: 8px 10px; border-radius: 8px; font-size: 12px; line-height: 1.4;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5); pointer-events: none;
        white-space: pre-line;
      }

      /* --- HUD (arriba a la derecha) --- */
      #hud {
        position: fixed; top: 12px; right: 12px; z-index: 10;
        display: flex; flex-direction: column; gap: 8px; align-items: stretch;
        min-width: 180px; max-width: 240px;
        max-height: calc(100vh - 72px); overflow-y: auto;
      }
      .stat { display: flex; justify-content: space-between; gap: 16px; line-height: 1.7; }
      .stat .val { font-weight: 600; }

      .panel-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
      .hud-info {
        border: none; background: transparent; color: #9ecbff; cursor: pointer;
        font-size: 12px; padding: 0 2px;
      }
      .hud-info:hover { color: #fff; }
      .util-row { display: flex; justify-content: space-between; gap: 16px; line-height: 1.7; }
      .util-row .util-val { font-weight: 600; }

      /* --- Panel de tecnología --- */
      .tech-count { font-size: 11px; opacity: 0.7; margin-bottom: 4px; }
      .tech-next { line-height: 1.4; margin-bottom: 6px; font-size: 12px; }
      .tech-bar {
        height: 9px; background: rgba(0, 0, 0, 0.45); border-radius: 6px; overflow: hidden;
        box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5);
      }
      .tech-fill {
        height: 100%; width: 0; border-radius: 6px; transition: width 0.3s;
        background: linear-gradient(#a5f7bc, #58d97e);
      }

      .controls { display: flex; gap: 6px; justify-content: center; }
      .ctrl {
        border: none; border-radius: 11px; padding: 7px 13px; cursor: pointer;
        color: #fff; font-size: 13px; font-weight: 600;
        background: linear-gradient(#54aaf8, #1d7ad8);
        box-shadow: 0 2px 0 #14589f, 0 2px 5px rgba(0, 0, 0, 0.25);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
        transition: filter 0.12s, transform 0.05s, box-shadow 0.05s;
      }
      .ctrl:hover { filter: brightness(1.12); }
      .ctrl:active { transform: translateY(2px); box-shadow: 0 0 0 #14589f; }
      .ctrl.active {
        background: linear-gradient(#ffd354, #f59d0e);
        box-shadow: 0 2px 0 #b06f06, 0 2px 5px rgba(0, 0, 0, 0.25);
      }

      /* --- Barras de demanda RCI --- */
      .rci { display: flex; gap: 12px; justify-content: center; align-items: flex-end; }
      .rci .bar-wrap {
        width: 22px; height: 56px; position: relative;
        background: rgba(255, 255, 255, 0.08); border-radius: 4px;
      }
      .rci .mid { position: absolute; left: 0; right: 0; top: 50%; height: 1px; background: rgba(255, 255, 255, 0.35); }
      .rci .fill { position: absolute; left: 2px; right: 2px; border-radius: 3px; transition: height 0.25s, bottom 0.25s, top 0.25s; }
      .rci .lbl { text-align: center; font-size: 11px; margin-top: 3px; opacity: 0.8; }

      /* --- Panel inspector (abajo al centro) --- */
      #inspector { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); z-index: 11; }
      .inspector { min-width: 240px; }
      .insp-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
      .insp-title { font-weight: 600; font-size: 15px; }
      .insp-close {
        border: none; background: transparent; color: #fff; cursor: pointer;
        font-size: 14px; opacity: 0.7;
      }
      .insp-close:hover { opacity: 1; }
      .insp-body { line-height: 1.7; opacity: 0.92; margin-bottom: 8px; }
      .insp-actions { display: flex; gap: 6px; }
      .ctrl[disabled] { opacity: 0.4; cursor: not-allowed; }

      /* --- Notificaciones (abajo a la izquierda, sobre la ayuda) --- */
      #notifications {
        position: fixed; bottom: 52px; left: 12px; z-index: 12;
        display: flex; flex-direction: column; gap: 6px; align-items: flex-start;
        max-width: 300px;
        /* Vive en la parte inferior de la columna izquierda; acotado para no
           subir hasta el toolbar (que vive arriba). */
        max-height: 200px; overflow-y: auto;
      }
      .notif {
        display: flex; gap: 8px; align-items: center;
        background: rgba(0, 0, 0, 0.6); color: #fff;
        padding: 7px 11px; border-radius: 8px; font-size: 12px;
        backdrop-filter: blur(4px); border-left: 3px solid #9ecbff;
      }
      .notif.warn { border-left-color: #ff6b6b; }
      .notif.info { border-left-color: #ffd54f; }

      /* --- Toasts (avisos temporales: desbloqueos) arriba al centro --- */
      #toasts {
        position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 40;
        display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none;
      }
      .toast {
        display: flex; gap: 10px; align-items: center;
        background: linear-gradient(rgba(26, 56, 92, 0.95), rgba(13, 30, 54, 0.95));
        color: #fff; font-weight: 600;
        padding: 10px 16px; border-radius: 13px; font-size: 14px;
        border: 1px solid rgba(140, 190, 255, 0.3);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5); border-left: 4px solid #7CFC9A;
        opacity: 0; transform: translateY(-12px); transition: opacity 0.35s, transform 0.35s;
      }
      .toast.show { opacity: 1; transform: translateY(0); }
      .toast-icon { font-size: 18px; }

      /* --- Botonera de guardado (abajo a la derecha) --- */
      #savebar { position: fixed; bottom: 12px; right: 12px; z-index: 12; }

      /* --- Menú de catástrofes (borde izquierdo, centrado: no pisa los menús de la derecha) --- */
      #disasterbar { position: fixed; left: 12px; top: 50%; transform: translateY(-50%); z-index: 12; }
      .disaster-menu { display: flex; flex-direction: column; gap: 6px; max-width: 168px; }
      .disaster-head { font-size: 12px; opacity: 0.85; }
      .disaster-row { display: flex; flex-wrap: wrap; gap: 6px; }
      .disaster-row .ctrl { font-size: 13px; padding: 5px 9px; }

      /* --- Ayuda de controles (abajo a la izquierda) --- */
      #hint {
        position: fixed; bottom: 12px; left: 12px; z-index: 10;
        background: linear-gradient(rgba(21, 45, 75, 0.82), rgba(10, 24, 44, 0.82));
        border: 1px solid rgba(140, 190, 255, 0.2);
        color: #fff; padding: 8px 12px; border-radius: 12px; font-size: 13px;
      }
      /* La ayuda según el dispositivo: mouse o dedo. */
      .hint-touch { display: none; }
      @media (pointer: coarse) {
        .hint-mouse { display: none; }
        .hint-touch { display: inline; }
      }

      /* --- Botón para mostrar/ocultar el HUD (solo en pantallas chicas) --- */
      #hudToggle {
        position: fixed; top: 8px; right: 8px; z-index: 15; display: none;
        border: none; border-radius: 11px; cursor: pointer;
        background: linear-gradient(#54aaf8, #1d7ad8);
        box-shadow: 0 2px 0 #14589f, 0 2px 5px rgba(0, 0, 0, 0.3);
        color: #fff; font-size: 17px; padding: 8px 11px;
      }

      /* --- Dedos en vez de mouse: botones más grandes --- */
      @media (pointer: coarse) {
        .cat { padding: 8px 11px; font-size: 13px; }
        .tool { padding: 11px 12px; font-size: 14px; }
        .tool-info { padding: 0 12px; font-size: 15px; }
        .ctrl { padding: 9px 14px; font-size: 14px; }
        .hud-info { font-size: 15px; padding: 2px 6px; }
      }

      /* --- Pantalla chica (celular): la barra pasa arriba en horizontal,
             el HUD se pliega con el botón 📊 y los paneles se achican --- */
      @media (max-width: 820px) {
        #hudToggle { display: block; }
        body.hud-collapsed #hud { display: none; }

        #toolbar {
          top: 8px; left: 8px; right: 56px; width: auto;
          flex-direction: row; align-items: center; gap: 6px;
          max-height: none; overflow-x: auto; overflow-y: hidden;
        }
        .tool-cats { flex-wrap: nowrap; }
        .cat { white-space: nowrap; }
        .tool-current {
          border-top: none; border-left: 1px solid rgba(255, 255, 255, 0.12);
          padding: 1px 6px 1px 8px; white-space: nowrap; font-size: 11px;
        }
        .tool-popup { width: min(300px, calc(100vw - 16px)); }

        #hud {
          top: 56px; right: 8px; min-width: 0; max-width: 200px;
          max-height: calc(100vh - 130px);
        }
        .panel { font-size: 12px; padding: 8px 10px; }

        #inspector { bottom: 8px; max-width: 96vw; }
        .inspector {
          min-width: 0; width: min(96vw, 340px);
          max-height: 42vh; overflow-y: auto;
        }

        #disasterbar { left: 8px; }
        .disaster-menu { max-width: 116px; }
        #notifications { left: 8px; bottom: 48px; max-width: 62vw; max-height: 130px; }
        #hint { bottom: 8px; left: 8px; font-size: 11px; max-width: 60vw; }
        .tool-tip { max-width: 70vw; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="toolbar"></div>
    <div id="hud"></div>
    <div id="inspector"></div>
    <div id="disasterbar"></div>
    <div id="savebar"></div>
    <div id="hint">
      <span class="hint-mouse">
        🖱️ Click izq: construir / seleccionar &nbsp;·&nbsp; Click der: rotar &nbsp;·&nbsp; Rueda: zoom &nbsp;·&nbsp; Click medio: mover
      </span>
      <span class="hint-touch">
        👆 Tap: seleccionar / construir &nbsp;·&nbsp; Con 🔍 un dedo mueve la cámara &nbsp;·&nbsp; Dos dedos: zoom y rotar
      </span>
    </div>
    <button id="hudToggle" title="Mostrar / ocultar paneles">📊</button>
    <script>
      // En pantallas chicas el HUD arranca plegado (el mapa es lo importante);
      // el botón 📊 lo muestra/oculta.
      (function () {
        var small = matchMedia('(max-width: 820px)').matches && matchMedia('(pointer: coarse)').matches;
        if (small) document.body.classList.add('hud-collapsed');
        document.getElementById('hudToggle').addEventListener('click', function () {
          document.body.classList.toggle('hud-collapsed');
        });
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
