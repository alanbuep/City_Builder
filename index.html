<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>City Builder</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%; overflow: hidden;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #app { position: fixed; inset: 0; }

      /* --- Paneles genéricos (HUD y toolbar comparten estilo) --- */
      .panel {
        background: rgba(0, 0, 0, 0.55); color: #fff;
        padding: 10px 12px; border-radius: 10px;
        backdrop-filter: blur(4px); font-size: 13px;
      }

      /* --- Barra de herramientas (arriba a la izquierda) --- */
      #toolbar {
        position: fixed; top: 12px; left: 12px; z-index: 10;
        display: flex; flex-direction: column; gap: 8px; width: 220px;
        background: rgba(0, 0, 0, 0.55);
        padding: 8px; border-radius: 10px; backdrop-filter: blur(4px);
        max-height: calc(100vh - 24px); overflow-y: auto;
      }
      .tool-cats { display: flex; flex-wrap: wrap; gap: 4px; }
      /* Indicador de la herramienta activa (el popup de edificios se cierra al elegir). */
      .tool-current {
        font-size: 12px; padding: 5px 6px 1px; opacity: 0.92;
        border-top: 1px solid rgba(255, 255, 255, 0.12);
      }
      /* Popup flotante con los edificios de la categoría abierta. */
      .tool-popup {
        position: fixed; z-index: 20; width: 240px;
        max-height: calc(100vh - 24px); overflow-y: auto;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.5);
      }
      .cat {
        border: none; border-radius: 8px; padding: 5px 8px;
        font-size: 12px; cursor: pointer; background: #2a2a2a; color: #fff;
        transition: background 0.12s;
      }
      .cat:hover { background: #3a3a3a; }
      .cat.active { background: #fff; color: #000; }

      .tool-list { display: flex; flex-direction: column; gap: 4px; }
      .tool-row { display: flex; gap: 4px; }
      .tool {
        flex: 1; display: flex; justify-content: space-between; align-items: center; gap: 8px;
        border: none; border-radius: 8px; padding: 7px 10px;
        font-size: 13px; cursor: pointer; text-align: left;
        background: #2a2a2a; color: #fff; transition: background 0.12s;
      }
      .tool:hover { background: #3a3a3a; }
      .tool.active { background: #fff; color: #000; }
      .tool.locked { opacity: 0.45; cursor: not-allowed; }
      .tool.locked:hover { background: #2a2a2a; }
      .tool-cost { font-size: 11px; opacity: 0.65; }

      .tool-info {
        border: none; border-radius: 8px; padding: 0 9px; cursor: pointer;
        background: #2a2a2a; color: #9ecbff; font-size: 13px;
      }
      .tool-info:hover { background: #3a3a3a; }
      .tool-tip {
        position: fixed; z-index: 30; max-width: 240px;
        background: rgba(20, 20, 20, 0.96); color: #fff;
        padding: 8px 10px; border-radius: 8px; font-size: 12px; line-height: 1.4;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5); pointer-events: none;
        white-space: pre-line;
      }

      /* --- HUD (arriba a la derecha) --- */
      #hud {
        position: fixed; top: 12px; right: 12px; z-index: 10;
        display: flex; flex-direction: column; gap: 8px; align-items: stretch;
        min-width: 180px; max-width: 240px;
        max-height: calc(100vh - 72px); overflow-y: auto;
      }
      .stat { display: flex; justify-content: space-between; gap: 16px; line-height: 1.7; }
      .stat .val { font-weight: 600; }

      .panel-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
      .hud-info {
        border: none; background: transparent; color: #9ecbff; cursor: pointer;
        font-size: 12px; padding: 0 2px;
      }
      .hud-info:hover { color: #fff; }
      .util-row { display: flex; justify-content: space-between; gap: 16px; line-height: 1.7; }
      .util-row .util-val { font-weight: 600; }

      /* --- Panel de tecnología --- */
      .tech-count { font-size: 11px; opacity: 0.7; margin-bottom: 4px; }
      .tech-next { line-height: 1.4; margin-bottom: 6px; font-size: 12px; }
      .tech-bar { height: 8px; background: rgba(255, 255, 255, 0.12); border-radius: 4px; overflow: hidden; }
      .tech-fill { height: 100%; width: 0; background: #7CFC9A; border-radius: 4px; transition: width 0.3s; }

      .controls { display: flex; gap: 6px; justify-content: center; }
      .ctrl {
        border: none; border-radius: 8px; padding: 6px 12px; cursor: pointer;
        background: #2a2a2a; color: #fff; font-size: 13px;
      }
      .ctrl:hover { background: #3a3a3a; }
      .ctrl.active { background: #fff; color: #000; }

      /* --- Barras de demanda RCI --- */
      .rci { display: flex; gap: 12px; justify-content: center; align-items: flex-end; }
      .rci .bar-wrap {
        width: 22px; height: 56px; position: relative;
        background: rgba(255, 255, 255, 0.08); border-radius: 4px;
      }
      .rci .mid { position: absolute; left: 0; right: 0; top: 50%; height: 1px; background: rgba(255, 255, 255, 0.35); }
      .rci .fill { position: absolute; left: 2px; right: 2px; border-radius: 3px; transition: height 0.25s, bottom 0.25s, top 0.25s; }
      .rci .lbl { text-align: center; font-size: 11px; margin-top: 3px; opacity: 0.8; }

      /* --- Panel inspector (abajo al centro) --- */
      #inspector { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); z-index: 11; }
      .inspector { min-width: 240px; }
      .insp-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
      .insp-title { font-weight: 600; font-size: 15px; }
      .insp-close {
        border: none; background: transparent; color: #fff; cursor: pointer;
        font-size: 14px; opacity: 0.7;
      }
      .insp-close:hover { opacity: 1; }
      .insp-body { line-height: 1.7; opacity: 0.92; margin-bottom: 8px; }
      .insp-actions { display: flex; gap: 6px; }
      .ctrl[disabled] { opacity: 0.4; cursor: not-allowed; }

      /* --- Notificaciones (abajo a la izquierda, sobre la ayuda) --- */
      #notifications {
        position: fixed; bottom: 52px; left: 12px; z-index: 12;
        display: flex; flex-direction: column; gap: 6px; align-items: flex-start;
        max-width: 300px;
        /* Vive en la parte inferior de la columna izquierda; acotado para no
           subir hasta el toolbar (que vive arriba). */
        max-height: 200px; overflow-y: auto;
      }
      .notif {
        display: flex; gap: 8px; align-items: center;
        background: rgba(0, 0, 0, 0.6); color: #fff;
        padding: 7px 11px; border-radius: 8px; font-size: 12px;
        backdrop-filter: blur(4px); border-left: 3px solid #9ecbff;
      }
      .notif.warn { border-left-color: #ff6b6b; }
      .notif.info { border-left-color: #ffd54f; }

      /* --- Toasts (avisos temporales: desbloqueos) arriba al centro --- */
      #toasts {
        position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 40;
        display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none;
      }
      .toast {
        display: flex; gap: 10px; align-items: center;
        background: rgba(20, 20, 20, 0.92); color: #fff;
        padding: 10px 16px; border-radius: 10px; font-size: 14px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5); border-left: 3px solid #7CFC9A;
        opacity: 0; transform: translateY(-12px); transition: opacity 0.35s, transform 0.35s;
      }
      .toast.show { opacity: 1; transform: translateY(0); }
      .toast-icon { font-size: 18px; }

      /* --- Botonera de guardado (abajo a la derecha) --- */
      #savebar { position: fixed; bottom: 12px; right: 12px; z-index: 12; }

      /* --- Ayuda de controles (abajo a la izquierda) --- */
      #hint {
        position: fixed; bottom: 12px; left: 12px; z-index: 10;
        background: rgba(0, 0, 0, 0.55); color: #fff;
        padding: 8px 12px; border-radius: 8px; font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="toolbar"></div>
    <div id="hud"></div>
    <div id="inspector"></div>
    <div id="savebar"></div>
    <div id="hint">
      🖱️ Click izq: construir / seleccionar &nbsp;·&nbsp; Click der: rotar &nbsp;·&nbsp; Rueda: zoom &nbsp;·&nbsp; Click medio: mover
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
